<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafetería Antonio Machado | Café de Especialidad</title>
    <meta name="description" content="Descubre el mejor café artesanal en Cafetería Antonio Machado. Experiencia única, granos de especialidad y ambiente acogedor.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;0,800;1,700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <nav id="main-nav">
        <button class="mobile-menu-btn" onclick="toggleMobileMenu()">
            <i class="fas fa-bars"></i>
        </button>
        <a href="index.html" class="logo">ANTONIO MACHADO</a>
        <div class="nav-links">
            <a href="index.html" class="active">Inicio</a>
            <a href="nosotros.html">Nosotros</a>
            <a href="catalogo.html">Menú</a>
        </div>
        <div class="auth-links">
            <a href="login.html" class="btn btn-primary" style="padding: 0.5rem 1.5rem; font-size: 0.8rem;">Staff Login</a>
        </div>
    </nav>

    <!-- Mobile Menu Overlay -->
    <div id="mobile-menu" class="mobile-nav-overlay">
        <span class="close-menu" onclick="toggleMobileMenu()">&times;</span>
        <a href="index.html" class="active" onclick="toggleMobileMenu()">Inicio</a>
        <a href="nosotros.html" onclick="toggleMobileMenu()">Nosotros</a>
        <a href="catalogo.html" onclick="toggleMobileMenu()">Menú</a>
        <a href="login.html" onclick="toggleMobileMenu()" style="font-size: 1rem; margin-top: 2rem; color: var(--text-muted);">Staff Login</a>
    </div>

    <section class="hero">
        <div class="hero-content">
            <h1 id="hero-title" data-aos="fade-up">Cargando...</h1>
            <p id="hero-desc" data-aos="fade-up" data-aos-delay="200"></p>
            <div data-aos="fade-up" data-aos-delay="400">
                <a href="catalogo.html" class="btn btn-primary">Explorar Menú</a>
            </div>
        </div>
    </section>

    <div class="wa-widget">
        <div id="wa-chat-window" class="wa-chat-window">
            <div class="wa-chat-header">
                <div style="width: 45px; height: 45px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">
                    <i class="fas fa-coffee"></i>
                </div>
                <div>
                    <div style="font-weight: 700;">Cafetería Antonio Machado</div>
                    <div class="wa-chat-status">● En línea</div>
                </div>
            </div>
            <div class="wa-chat-body">
                <div class="wa-message">
                    ¡Hola! ☕ ¿En qué podemos ayudarte hoy? Cuéntanos qué te gustaría pedir.
                </div>
            </div>
            <div class="wa-chat-footer">
                <input type="text" id="wa-chat-input" class="wa-input" placeholder="Escribe un mensaje..." onkeypress="if(event.key === 'Enter') sendWhatsAppMessage()">
                <button class="wa-send-btn" onclick="sendWhatsAppMessage()">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
        <div class="wa-btn" onclick="toggleWhatsApp()">
            <i class="fab fa-whatsapp"></i>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/whatsapp.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });

        const SUPABASE_URL = 'https://zkacoudrehddslndmpzy.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_8H72Pi-Mk0gPdh-sOEDSCA_mb3iefP4';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadSettings() {
            const { data } = await supabaseClient.from('site_settings').select('key, value');
            if (data) {
                data.forEach(s => {
                    const el = document.getElementById(s.key.replace(/_/g, '-'));
                    if (el) el.textContent = s.value;
                });
            }
        }
        loadSettings();

        function toggleMobileMenu() {
            document.getElementById('mobile-menu').classList.toggle('active');
        }

        window.addEventListener('scroll', () => {
            const nav = document.getElementById('main-nav');
            if (window.scrollY > 50) {
                nav.classList.add('scrolled');
            } else {
                nav.classList.remove('scrolled');
            }
        });
    </script>
</body>
</html>
